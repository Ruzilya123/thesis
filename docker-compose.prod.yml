x-backend-service: &backend-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment: &app-environment
    DB_ENGINE: postgresql
    POSTGRES_HOST: doubleb-db
    DB_HOST: doubleb-db
    POSTGRES_DB: ${POSTGRES_DB:-doubleb_db}
    POSTGRES_USER: ${POSTGRES_USER:-doubleb}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doubleb_secure_password}
    POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    DB_NAME: ${POSTGRES_DB:-doubleb_db}
    DB_USER: ${POSTGRES_USER:-doubleb}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-doubleb_secure_password}
    DB_PORT: ${POSTGRES_PORT:-5432}
  networks:
    - web-network

x-app-depends: &app-depends
  db:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

services:
  api:
    <<: *backend-service
    container_name: doubleb-api
    restart: unless-stopped
    depends_on: *app-depends
    environment:
      <<: *app-environment
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["gunicorn", "thesis_backend.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2", "--access-logfile", "-"]
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: doubleb-frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - web-network
    expose:
      - "80"

  migrate:
    <<: *backend-service
    container_name: doubleb-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-environment
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["sh", "-c", "python manage.py migrate && python manage.py seed_data"]
    restart: "no"

  db:
    image: postgres:17-alpine
    container_name: doubleb-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - web-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  web-network:
    external: true
