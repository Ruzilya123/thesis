services:
  db:
    image: postgres:16-alpine
    container_name: doubleb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: doubleb_shop
      POSTGRES_USER: doubleb
      POSTGRES_PASSWORD: doubleb_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doubleb -d doubleb_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./thesis_backend
    container_name: doubleb_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: docker-secret-key-change-me
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DB_ENGINE: postgresql
      DB_NAME: doubleb_shop
      DB_USER: doubleb
      DB_PASSWORD: doubleb_secret
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./thesis-front
      args:
        VITE_API_URL: http://localhost:8000/api
    container_name: doubleb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
